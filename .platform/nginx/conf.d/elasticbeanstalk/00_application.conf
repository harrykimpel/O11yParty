# Overrides EB's default app location to forward WebSocket Upgrade/Connection headers to the
# container, so the game's SignalR hub (/hubs/buzz) works behind EB's nginx proxy.
#
# The proxy_pass port (8080) is pinned by docker-compose.yml ("8080:8080") together with the
# Dockerfile's `ASPNETCORE_URLS=http://+:8080` / `EXPOSE 8080`. If you deploy without the
# docker-compose port mapping, confirm the host port EB published and update it here — or drop
# nginx entirely with the proxy:none alternative noted in the deploy runbook.
location / {
    proxy_pass          http://127.0.0.1:8080;
    proxy_http_version  1.1;
    proxy_set_header    Connection          $connection_upgrade;
    proxy_set_header    Upgrade             $http_upgrade;
    proxy_set_header    Host                $host;
    proxy_set_header    X-Real-IP           $remote_addr;
    proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto   $scheme;

    # Keep the long-lived buzzer hub connection open (default nginx proxy timeout is 60s).
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
}
