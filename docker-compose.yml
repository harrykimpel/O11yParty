# Elastic Beanstalk Docker platform deployment for the game.
#
# IMPORTANT (port): when a docker-compose.yml is present, EB runs Docker Compose directly and does
# NOT start its nginx reverse proxy. Traffic hits the instance on port 80, so the container MUST
# publish host port 80. Kestrel (ASPNETCORE_URLS=http://+:8080 in the Dockerfile) handles the
# SignalR WebSocket natively — no nginx, no proxy WebSocket config needed.
#
# IMPORTANT (env): in compose mode EB does NOT auto-inject environment properties (eb setenv) into
# the container. Each one must be passed through here via ${VAR} interpolation — EB makes the
# configured properties available to the compose invocation. Without this the container starts with
# blank BuzzHub:SharedSecret and the hub fails closed (rejects all buzzer connections).
#
# Ignored by local `dotnet run`; only docker/EB consume it.
services:
  web:
    build: .
    ports:
      - "80:8080"   # host:container — host 80 is what EB exposes publicly
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - BuzzHub__SharedSecret=${BuzzHub__SharedSecret}
      - NEW_RELIC_LICENSE_KEY=${NEW_RELIC_LICENSE_KEY}
    restart: unless-stopped
