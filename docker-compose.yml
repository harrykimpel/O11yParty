# Used by the Elastic Beanstalk Docker (AL2023) platform to build the game image and pin the
# host port to 8080, so the nginx override in .platform/nginx/conf.d/elasticbeanstalk/ proxies
# to a deterministic port. Ignored by local `dotnet run`; only docker/EB consume it.
services:
  web:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Real values are injected by `eb setenv` (environment properties) — these are placeholders.
      - ASPNETCORE_ENVIRONMENT=Production
    restart: unless-stopped
